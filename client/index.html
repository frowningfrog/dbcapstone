<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Capstone</title>
  </head>
  <body>
    <div class="container">
      <div class="form-wrapper">
        <!-- Login Form -->
        <form id="loginForm" class="form active">
          <h1>Login</h1>
          <input type="email" id="loginEmail" placeholder="Email" required />
          <input type="password" id="loginPassword" placeholder="Password" required />
          <button type="submit">Login</button>
          <p class="toggle">Don't have an account? <button type="button" id="toRegister">Register here</button></p>
          <div id="loginMessage" class="message"></div>
        </form>

        <!-- Register Form -->
        <form id="registerForm" class="form">
          <h1>Register</h1>
          <input type="email" id="registerEmail" placeholder="Email" required />
          <input type="password" id="registerPassword" placeholder="Password" required />
          <input type="password" id="registerConfirm" placeholder="Confirm Password" required />
          <button type="submit">Register</button>
          <p class="toggle">Already have an account? <button type="button" id="toLogin">Login here</button></p>
          <div id="registerMessage" class="message"></div>
        </form>
      </div>
    </div>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      }

      .container {
        width: 100%;
        max-width: 400px;
        padding: 20px;
      }

      .form-wrapper {
        position: relative;
        height: 500px;
      }

      .form {
        position: absolute;
        width: 100%;
        background: white;
        padding: 40px;
        border-radius: 10px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
        opacity: 0;
        transform: translateX(100%);
        transition: all 0.3s ease;
        pointer-events: none;
      }

      .form.active {
        opacity: 1;
        transform: translateX(0);
        pointer-events: all;
      }

      .form h1 {
        text-align: center;
        margin-bottom: 30px;
        color: #333;
        font-size: 28px;
      }

      .form input {
        width: 100%;
        padding: 12px;
        margin-bottom: 15px;
        border: 2px solid #e0e0e0;
        border-radius: 5px;
        font-size: 14px;
        transition: border-color 0.3s;
      }

      .form input:focus {
        outline: none;
        border-color: #667eea;
        box-shadow: 0 0 5px rgba(102, 126, 234, 0.3);
      }

      .form button[type="submit"] {
        width: 100%;
        padding: 12px;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        border: none;
        border-radius: 5px;
        font-size: 16px;
        font-weight: bold;
        cursor: pointer;
        transition: transform 0.2s;
      }

      .form button[type="submit"]:hover {
        transform: translateY(-2px);
        box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
      }

      .form button[type="submit"]:active {
        transform: translateY(0);
      }

      .toggle {
        text-align: center;
        margin-top: 20px;
        color: #666;
        font-size: 14px;
      }

      .toggle button {
        background: none;
        border: none;
        color: #667eea;
        cursor: pointer;
        text-decoration: underline;
        font-size: 14px;
        padding: 0;
      }

      .toggle button:hover {
        color: #764ba2;
      }

      .message {
        margin-top: 15px;
        padding: 10px;
        border-radius: 5px;
        text-align: center;
        font-size: 14px;
        min-height: 20px;
      }

      .message.error {
        background-color: #ffebee;
        color: #c62828;
      }

      .message.success {
        background-color: #e8f5e9;
        color: #2e7d32;
      }
    </style>

    <script>
      const loginForm = document.getElementById("loginForm");
      const registerForm = document.getElementById("registerForm");
      const toRegisterBtn = document.getElementById("toRegister");
      const toLoginBtn = document.getElementById("toLogin");

      // Form switching
      toRegisterBtn.addEventListener("click", (e) => {
        e.preventDefault();
        loginForm.classList.remove("active");
        registerForm.classList.add("active");
      });

      toLoginBtn.addEventListener("click", (e) => {
        e.preventDefault();
        registerForm.classList.remove("active");
        loginForm.classList.add("active");
      });

      // Login form submission
      loginForm.addEventListener("submit", async (e) => {
        e.preventDefault();
        const email = document.getElementById("loginEmail").value;
        const password = document.getElementById("loginPassword").value;
        const messageDiv = document.getElementById("loginMessage");

        try {
          const response = await fetch("/api/auth/login", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ email, password }),
          });

          const data = await response.json();

          if (response.ok) {
            messageDiv.className = "message success";
            messageDiv.textContent = data.message;
            localStorage.setItem("token", data.token);
            setTimeout(() => {
              window.location.href = "/courses";
            }, 1000);
          } else {
            messageDiv.className = "message error";
            messageDiv.textContent = data.message;
          }
        } catch (err) {
          messageDiv.className = "message error";
          messageDiv.textContent = "An error occurred";
        }
      });

      // Register form submission
      registerForm.addEventListener("submit", async (e) => {
        e.preventDefault();
        const email = document.getElementById("registerEmail").value;
        const password = document.getElementById("registerPassword").value;
        const confirmPassword = document.getElementById("registerConfirm").value;
        const messageDiv = document.getElementById("registerMessage");

        if (password !== confirmPassword) {
          messageDiv.className = "message error";
          messageDiv.textContent = "Passwords do not match";
          return;
        }

        try {
          const response = await fetch("/api/auth/register", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ email, password }),
          });

          const data = await response.json();

          if (response.ok) {
            messageDiv.className = "message success";
            messageDiv.textContent = data.message;
            localStorage.setItem("token", data.token);
            setTimeout(() => {
              window.location.href = "/courses";
            }, 1000);
          } else {
            messageDiv.className = "message error";
            messageDiv.textContent = data.message;
          }
        } catch (err) {
          messageDiv.className = "message error";
          messageDiv.textContent = "An error occurred";
        }
      });
    </script>
  </body>
</html>
