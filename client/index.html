<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />    <link rel="stylesheet" href="/style.css" />    <title>Capstone</title>
  </head>
  <body>
    <div class="container">
      <div class="form-wrapper">
        <!-- Login Form -->
        <form id="loginForm" class="form active">
          <h1>Student login</h1>
          <input type="email" id="loginEmail" placeholder="Email" required />
          <input type="password" id="loginPassword" placeholder="Password" required />
          <button type="submit">Login</button>
          <p class="toggle">Don't have an account? <button type="button" id="toRegister">Register here</button></p>
          <div id="loginMessage" class="message"></div>
        </form>

        <!-- Register Form -->
        <form id="registerForm" class="form">
          <h1>Register student</h1>
          <input type="email" id="registerEmail" placeholder="Email" required />
          <input type="password" id="registerPassword" placeholder="Password" required />
          <input type="password" id="registerConfirm" placeholder="Confirm Password" required />
          <button type="submit">Register</button>
          <p class="toggle">Already have an account? <button type="button" id="toLogin">Login here</button></p>
          <div id="registerMessage" class="message"></div>
        </form>
      </div>
      <div id="coursesPage" class="courses-view hidden">
        <h1>Courses</h1>
        <div id="coursesMessage" class="message"></div>
        <ul id="coursesList" class="courses-list"></ul>
        <button id="logoutBtn" class="secondary-btn">Logout</button>
      </div>
    </div>



    <script>
      const loginForm = document.getElementById("loginForm");
      const registerForm = document.getElementById("registerForm");
      const toRegisterBtn = document.getElementById("toRegister");
      const toLoginBtn = document.getElementById("toLogin");
      const coursesPage = document.getElementById("coursesPage");
      const coursesList = document.getElementById("coursesList");
      const coursesMessage = document.getElementById("coursesMessage");
      const logoutBtn = document.getElementById("logoutBtn");
      const formWrapper = document.querySelector(".form-wrapper");

      const apiAuth = {
        login: "/api/auth/login",
        register: "/api/auth/register",
        courses: "/api/courses",
      };

      function showCoursesView() {
        formWrapper.classList.add("hidden");
        coursesPage.classList.remove("hidden");
        coursesPage.classList.add("active");
        loginForm.classList.remove("active");
        registerForm.classList.remove("active");
      }

      function showAuthView() {
        formWrapper.classList.remove("hidden");
        coursesPage.classList.add("hidden");
        coursesPage.classList.remove("active");
        loginForm.classList.add("active");
      }

      async function fetchCourses() {
        coursesMessage.textContent = "Loading courses...";
        coursesMessage.className = "message";
        coursesList.innerHTML = "";

        try {
          const token = localStorage.getItem("token");
          const headers = { "Content-Type": "application/json" };
          if (token) {
            headers.Authorization = `Bearer ${token}`;
          }

          const response = await fetch(apiAuth.courses, { headers });
          const data = await response.json();

          if (!response.ok) {
            coursesMessage.className = "message error";
            coursesMessage.textContent = data.message || "Unable to load courses.";
            return;
          }

          if (!Array.isArray(data.courses) || data.courses.length === 0) {
            coursesMessage.className = "message success";
            coursesMessage.textContent = "No courses found.";
            return;
          }

          coursesMessage.textContent = "";
          data.courses.forEach((course) => {
            const item = document.createElement("li");
            item.className = "course-item";
            const fieldList = Object.entries(course)
              .filter(([key]) => key !== "isEnrolled")
              .map(([key, value]) => `<div><strong>${key}:</strong> ${value ?? ""}</div>`)
              .join("");

            const action = course.isEnrolled
              ? `<div class="enrolled-label">Already enrolled</div>`
              : `<button class="enroll-button" data-course-id="${course.id}">Enroll</button>`;

            item.innerHTML = `${fieldList}${action}`;
            coursesList.appendChild(item);
          });
        } catch (err) {
          coursesMessage.className = "message error";
          coursesMessage.textContent = "Unable to load courses.";
        }
      }

      coursesList.addEventListener("click", async (event) => {
        if (!event.target.matches(".enroll-button")) {
          return;
        }

        const courseId = event.target.dataset.courseId;
        const token = localStorage.getItem("token");

        if (!token) {
          coursesMessage.className = "message error";
          coursesMessage.textContent = "You must be logged in to enroll.";
          return;
        }

        try {
          const response = await fetch(`${apiAuth.courses}/${courseId}/enroll`, {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              Authorization: `Bearer ${token}`,
            },
          });

          const data = await response.json();
          if (response.ok) {
            coursesMessage.className = "message success";
            coursesMessage.textContent = data.message;
            await fetchCourses();
          } else {
            coursesMessage.className = "message error";
            coursesMessage.textContent = data.message || "Unable to enroll.";
          }
        } catch (err) {
          coursesMessage.className = "message error";
          coursesMessage.textContent = "Unable to enroll.";
        }
      });

      async function handleAuthSubmit(url, messageDiv) {
        const formData = new FormData(messageDiv.form);
        const email = formData.get("email");
        const password = formData.get("password");

        try {
          const response = await fetch(url, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ email, password }),
          });

          const data = await response.json();

          if (response.ok) {
            messageDiv.className = "message success";
            messageDiv.textContent = data.message;
            localStorage.setItem("token", data.token);
            showCoursesView();
            await fetchCourses();
          } else {
            messageDiv.className = "message error";
            messageDiv.textContent = data.message;
          }
        } catch (err) {
          messageDiv.className = "message error";
          messageDiv.textContent = "An error occurred";
        }
      }

      // Form switching
      toRegisterBtn.addEventListener("click", (e) => {
        e.preventDefault();
        loginForm.classList.remove("active");
        registerForm.classList.add("active");
      });

      toLoginBtn.addEventListener("click", (e) => {
        e.preventDefault();
        registerForm.classList.remove("active");
        loginForm.classList.add("active");
      });

      loginForm.addEventListener("submit", async (e) => {
        e.preventDefault();
        const messageDiv = document.getElementById("loginMessage");
        const email = document.getElementById("loginEmail").value;
        const password = document.getElementById("loginPassword").value;

        try {
          const response = await fetch(apiAuth.login, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ email, password }),
          });

          const data = await response.json();

          if (response.ok) {
            messageDiv.className = "message success";
            messageDiv.textContent = data.message;
            localStorage.setItem("token", data.token);
            showCoursesView();
            await fetchCourses();
          } else {
            messageDiv.className = "message error";
            messageDiv.textContent = data.message;
          }
        } catch (err) {
          messageDiv.className = "message error";
          messageDiv.textContent = "An error occurred";
        }
      });

      registerForm.addEventListener("submit", async (e) => {
        e.preventDefault();
        const email = document.getElementById("registerEmail").value;
        const password = document.getElementById("registerPassword").value;
        const confirmPassword = document.getElementById("registerConfirm").value;
        const messageDiv = document.getElementById("registerMessage");

        if (password !== confirmPassword) {
          messageDiv.className = "message error";
          messageDiv.textContent = "Passwords do not match";
          return;
        }

        try {
          const response = await fetch(apiAuth.register, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ email, password }),
          });

          const data = await response.json();

          if (response.ok) {
            messageDiv.className = "message success";
            messageDiv.textContent = data.message;
            localStorage.setItem("token", data.token);
            showCoursesView();
            await fetchCourses();
          } else {
            messageDiv.className = "message error";
            messageDiv.textContent = data.message;
          }
        } catch (err) {
          messageDiv.className = "message error";
          messageDiv.textContent = "An error occurred";
        }
      });

      logoutBtn.addEventListener("click", () => {
        localStorage.removeItem("token");
        coursesMessage.textContent = "";
        coursesList.innerHTML = "";
        showAuthView();
      });
    </script>
  </body>
</html>
